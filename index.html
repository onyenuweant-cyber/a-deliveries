<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A.Deliveries | Premium Store</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0f172a;color:#f8fafc;font-family:'Inter',sans-serif;}
.navbar{display:flex;justify-content:space-between;align-items:center;padding:20px 8%;background:#111827;}
.brand{display:flex;align-items:center;gap:12px;}
.brand img{width:50px;}
.brand-name{font-family:'Playfair Display',serif;font-size:22px;letter-spacing:2px;}
.admin-btn{background:#10b981;border:none;color:white;padding:8px 14px;border-radius:6px;cursor:pointer;}
.admin-btn:hover{background:#059669;}
.hero{text-align:center;padding:80px 20px 40px;}
.hero h1{font-family:'Playfair Display',serif;font-size:38px;margin-bottom:10px;}
.hero p{color:#94a3b8;}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:30px;padding:60px 8%;}
.product-card{background:#1e293b;border-radius:12px;overflow:hidden;transition:0.3s;}
.product-card:hover{transform:translateY(-6px);}
.product-card img{width:100%;height:220px;object-fit:cover;}
.product-info{padding:18px;}
.product-info h3{margin-bottom:6px;}
.product-info p{color:#10b981;font-weight:600;margin-bottom:12px;}
.delete-btn{margin-top:10px;background:#dc2626;border:none;color:white;padding:7px;border-radius:6px;cursor:pointer;width:100%;}
.delete-btn:hover{background:#b91c1c;}
.admin-panel{display:none;background:#111827;padding:40px 8%;}
.admin-panel h2{margin-bottom:20px;font-family:'Playfair Display',serif;}
.admin-panel input{width:100%;padding:12px;margin-bottom:12px;border-radius:6px;border:none;font-size:14px;}
.admin-panel button{width:100%;padding:12px;background:#10b981;border:none;color:white;border-radius:6px;cursor:pointer;}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);justify-content:center;align-items:center;}
.modal-box{background:#1e293b;padding:25px;border-radius:10px;width:280px;text-align:center;}
.modal-box input{width:100%;padding:10px;margin:15px 0;border-radius:6px;border:none;}
.modal-box button{width:100%;padding:10px;background:#10b981;border:none;color:white;border-radius:6px;cursor:pointer;}
footer{text-align:center;padding:20px;background:#111827;color:#64748b;}
</style>
</head>
<body>

<div class="navbar">
  <div class="brand">
    <img src="logo.png" alt="A.Deliveries Logo">
    <div class="brand-name">A.DELIVERIES</div>
  </div>
  <button class="admin-btn" onclick="openLogin()">Admin</button>
</div>

<section class="hero">
  <h1>Premium Dropshipping Store</h1>
  <p>Quality products delivered worldwide.</p>
</section>

<section class="products" id="products"></section>

<div class="admin-panel" id="adminPanel">
  <h2>Add New Product</h2>
  <input type="text" id="name" placeholder="Product Name">
  <input type="text" id="price" placeholder="Product Price (₦)">
  <input type="file" id="imageFile" accept="image/*">
  <button onclick="addProduct()">Upload Product</button>
</div>

<div class="modal" id="loginModal">
  <div class="modal-box">
    <h3>Admin Login</h3>
    <input type="password" id="password" placeholder="Enter Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<footer>
© 2026 A.Deliveries | All Rights Reserved
</footer>

<!-- Supabase JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.7.0/dist/supabase.min.js"></script>
<script>
// ✅ Replace with your Supabase project URL and anon key
const SUPABASE_URL = "https://ivmbyodsulkptikoyrwg.supabase.co";
const SUPABASE_KEY = "sb_publishable_6eCy5-E2rxITmJpHl1T73Q_Rp5vWe0e";
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const PASSWORD = "Admin123";
let isAdmin = false;

// Show login modal
function openLogin(){document.getElementById("loginModal").style.display="flex";}

// Admin login
function login(){
  const pass = document.getElementById("password").value;
  if(pass===PASSWORD){
    isAdmin = true;
    document.getElementById("adminPanel").style.display="block";
    document.getElementById("loginModal").style.display="none";
    renderProducts();
  } else {alert("Wrong password");}
}

// Fetch products from Supabase
async function renderProducts(){
  const container = document.getElementById("products");
  container.innerHTML = "";
  let { data: products, error } = await supabase.from("products").select("*").order("created_at",{ascending:false});
  products.forEach(p=>{
    const card = document.createElement("div");
    card.className="product-card";
    card.innerHTML=`
      <img src="${p.image_url}">
      <div class="product-info">
        <h3>${p.name}</h3>
        <p>₦${p.price}</p>
        ${isAdmin?`<button class="delete-btn" onclick="deleteProduct(${p.id})">Delete</button>`:""}
      </div>`;
    container.appendChild(card);
  });
}

// Upload product
async function addProduct(){
  const name = document.getElementById("name").value.trim();
  const price = document.getElementById("price").value.trim();
  const file = document.getElementById("imageFile").files[0];

  if(!name || !price || !file){alert("Fill all fields"); return;}

  // Upload image to Supabase storage
  const fileName = Date.now() + "_" + file.name;
  const { data, error } = await supabase.storage.from("product-images").upload(fileName, file);
  if(error){alert("Image upload failed"); return;}
  
  const { publicURL } = supabase.storage.from("product-images").getPublicUrl(fileName);

  // Insert product into table
  await supabase.from("products").insert([{name:name, price:price, image_url:publicURL}]);

  document.getElementById("name").value="";
  document.getElementById("price").value="";
  document.getElementById("imageFile").value="";

  renderProducts();
}

// Delete product
async function deleteProduct(id){
  if(confirm("Delete this product?")){
    await supabase.from("products").delete().eq("id", id);
    renderProducts();
  }
}

// Initial load
renderProducts();
</script>

</body>
</html>
